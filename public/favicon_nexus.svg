<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Ombre portée interne pour effet de profondeur subtil -->
    <filter id="inner-shadow">
      <feOffset dx="0" dy="1" />
      <feGaussianBlur stdDeviation="1" result="offset-blur" />
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse" />
      <feFlood flood-color="black" flood-opacity="0.3" result="color" />
      <feComposite operator="in" in="color" in2="inverse" result="shadow" />
      <feComposite operator="over" in="shadow" in2="SourceGraphic" />
    </filter>
  </defs>

  <!-- 1. Background: Deep Charcoal Luxury #1a120b -->
  <circle cx="32" cy="32" r="32" fill="#1a120b"/>

  <!-- 2. The Gold Rim (Sceau d'Or) inside the edge -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#C5A059" stroke-width="1.5" opacity="0.8"/>

  <!-- 3. The Geometric Hammer ( Ivory White #F2E8DC ) -->
  <g transform="translate(32, 32) rotate(-45) translate(-32, -32)">
    
    <!-- Manche: Robust & Rounded -->
    <path d="M29 24 L29 50 A 3 3 0 0 0 35 50 L35 24 Z" fill="#F2E8DC"/>
    
    <!-- Tête: Geometric Precision -->
    <path d="M16 14 A 2 2 0 0 1 18 12 L46 12 A 2 2 0 0 1 48 14 L48 22 A 2 2 0 0 1 46 24 L18 24 A 2 2 0 0 1 16 22 Z" fill="#F2E8DC"/>
    
    <!-- Reflet d'Or sur le marteau (Detail Premium) -->
    <path d="M38 12 L38 24" stroke="#C5A059" stroke-width="2" opacity="0.6"/>
  </g>
</svg>
